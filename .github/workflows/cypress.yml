name: Seva Cypress Automation Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '45 12 * * *'   # 19:45 WIB
    - cron: '15 13 * * *'   # 19:45 WIB

concurrency:
  group: cypress-${{ github.ref_name }}-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Seva2.0-WebCypress"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect trigger & start time
        run: |
          echo "TRIGGER=${{ github.event_name }}" >> $GITHUB_ENV
          echo "JOB_START_TIME=$(date +%s)"       >> $GITHUB_ENV
        working-directory: "Seva2.0-WebCypress"

      - name: Debug schedule info
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "schedule cron: ${{ github.event.schedule }}"
        working-directory: "Seva2.0-WebCypress"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc
        working-directory: "Seva2.0-WebCypress"

      - name: Detect schedule phase
        if: github.event_name == 'schedule'
        run: |
          CRON="${{ github.event.schedule }}"
          if [ "$CRON" = "45 12 * * *" ]; then
            PHASE="phase1"
          elif [ "$CRON" = "15 13 * * *" ]; then
            PHASE="phase2"
          fi
          echo "PHASE=$PHASE" >> $GITHUB_ENV
          echo "Detected PHASE=$PHASE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install project dependencies
        run: npm ci

      # ============================================================
      # RUN CYPRESS
      # ============================================================
      - name: Run Cypress Tests
        continue-on-error: true
        run: |
          if [ "$PHASE" = "phase1" ]; then
            SPEC_PATH="cypress/e2e/Phase1_RefinancingLeads/**/*.cy.js"
          elif [ "$PHASE" = "phase2" ]; then
            SPEC_PATH="cypress/e2e/Phase1_RefinancingLeads/**/*.cy.js"
          else
            SPEC_PATH="cypress/e2e/**/*.cy.js"
          fi

          echo "Running specs: $SPEC_PATH"

          npx cypress run \
            --browser chrome \
            --spec "$SPEC_PATH" \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        run: |
          touch cypress-raw.txt
          sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # ============================================================
      # ALLURE
      # ============================================================
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          fi

      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: "Seva2.0-WebCypress/allure-report/"
          retention-days: 30

      # ============================================================
      # EXTRACT STATS
      # ============================================================
      - name: Extract test summary
        if: always()
        run: |
          JOB_END_TIME=$(date +%s)
          DURATION_SEC=$(( JOB_END_TIME - JOB_START_TIME ))
          MINUTES=$((DURATION_SEC / 60))
          SECONDS=$((DURATION_SEC % 60))

          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          echo "=== SUMMARY LINE: $SUMMARY_LINE ==="

          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            echo "=== CLEAN: $CLEAN ==="
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi

          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi


          if [ "$PHASE" = "phase1" ]; then
            TS_NAME="• Phase1_RefinancingLeads"
          elif [ "$PHASE" = "phase2" ]; then
            TS_NAME="• Phase1_RefinancingLeads"
          else
            TS_NAME=$(find cypress/e2e -mindepth 1 -maxdepth 1 -type d \
              | sed 's|.*/||' | sort | sed 's/^/• /')
          fi
          TS_NAME=${TS_NAME:-"• e2e"}
          echo "=== TS_NAME: $TS_NAME ==="

          echo "TOTAL_TESTS=$TOTAL"                    >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSING"                 >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILING"                 >> $GITHUB_ENV
          echo "PENDING_TESTS=$PENDING"                >> $GITHUB_ENV
          echo "TEST_DURATION=${MINUTES}m ${SECONDS}s" >> $GITHUB_ENV
          echo "PASS_RATE=${PASS_RATE}%"               >> $GITHUB_ENV
          echo "TS_NAME<<EOF"                          >> $GITHUB_ENV
          echo "$TS_NAME"                              >> $GITHUB_ENV
          echo "EOF"                                   >> $GITHUB_ENV

          echo "Total=$TOTAL | Passed=$PASSING | Failed=$FAILING | TS=$TS_NAME"

      - name: Extract failed test details
        if: always()
        run: |
          TEST_RESULTS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "TEST_RESULTS_URL=$TEST_RESULTS_URL" >> $GITHUB_ENV

          FAILED_TESTS_PARSED=$(awk '
            /^[[:space:]]+[0-9]+\)/ { in_block=1; describe_line=""; test_line=""; next }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); describe_line=line; next
            }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line!="" && test_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); gsub(/:$/, "", line)
              test_line=line; print describe_line "|" test_line; in_block=0
            }
            /^[[:space:]]*$/ && in_block==1 { in_block=0 }
          ' cypress-output.txt)

          echo "=== FAILED TESTS PARSED ==="
          echo "$FAILED_TESTS_PARSED"

          FAILED_SPECS_RAW=$(awk '
            /│[[:space:]]+✖/ {
              line=$0
              gsub(/.*✖[[:space:]]+/, "", line)
              gsub(/[[:space:]]+[0-9].*$/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              buf=line
              if (buf ~ /\.cy\.js$/) {
                gsub(/\.cy\.js$/, "", buf)
                print buf
                buf=""
              }
              capturing=1
              next
            }
            capturing==1 && /│[[:space:]]+[✔✖]/ { capturing=0; buf="" }
            capturing==1 && /│/ {
              line=$0
              gsub(/^[^│]*│[[:space:]]+/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              buf=buf line
              if (buf ~ /\.cy\.js/) {
                gsub(/\.cy\.js.*$/, "", buf)
                print buf
                buf=""
                capturing=0
              }
              next
            }
            capturing==1 && !/│/ { capturing=0; buf="" }
          ' cypress-output.txt | sort -u)

          echo "=== FAILED SPECS RAW: ==="
          echo "$FAILED_SPECS_RAW"

          FAILED_SPECS=""
          while IFS= read -r tc_name; do
            [ -z "$tc_name" ] && continue
            FOUND=$(find cypress/e2e -name "${tc_name}.cy.js" 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              SUITE=$(dirname "$FOUND" | sed 's|.*/cypress/e2e/||; s|cypress/e2e/||; s|^\./||')
              FAILED_SPECS="${FAILED_SPECS}${SUITE}/${tc_name}"$'\n'
            else
              FAILED_SPECS="${FAILED_SPECS}${tc_name}"$'\n'
            fi
          done <<< "$FAILED_SPECS_RAW"

          FAILED_SPECS=$(printf '%s' "$FAILED_SPECS" | sed '/^$/d' | sort -u)
          echo "=== FAILED SPECS WITH SUITE: ==="
          echo "$FAILED_SPECS"

          echo "FAILED_SPECS<<EOF"         >> $GITHUB_ENV
          echo "$FAILED_SPECS"             >> $GITHUB_ENV
          echo "EOF"                       >> $GITHUB_ENV

          echo "FAILED_TESTS_PARSED<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS_PARSED"     >> $GITHUB_ENV
          echo "EOF"                      >> $GITHUB_ENV

      # ============================================================
      # DISCORD NOTIFICATION
      # ============================================================
      - name: Send Discord Notification
        if: always()
        run: |
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")

          TOTAL=${TOTAL_TESTS:-0}
          PASSED=${PASSED_TESTS:-0}
          FAILED=${FAILED_TESTS:-0}
          PENDING=${PENDING_TESTS:-0}

          if [ "$FAILED" != "0" ]; then
            STATUS_TEXT="has failed"
            RESULT_ICON="❌"
            COLOR=15158332
          else
            STATUS_TEXT="has passed"
            RESULT_ICON="✅"
            COLOR=3066993
          fi

          case "$TRIGGER" in
            schedule)          TRIGGER_LABEL="Scheduled"    ;;
            push)              TRIGGER_LABEL="Push"         ;;
            pull_request)      TRIGGER_LABEL="Pull Request" ;;
            workflow_dispatch) TRIGGER_LABEL="Manual"       ;;
            *)                 TRIGGER_LABEL="$TRIGGER"     ;;
          esac

          if [ "$TRIGGER" = "pull_request" ]; then
            BRANCH_INFO="PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})"
          else
            BRANCH_INFO="${{ github.ref_name }}"
          fi

          DISPLAY_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"

          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            SUITE_DISPLAY=$(echo "$FAILED_SPECS" \
              | sed 's|/[^/]*$||' \
              | sort -u \
              | sed 's/^/• /')
          else
            SUITE_DISPLAY="$TS_NAME"
          fi

          FAILED_SECTION=""
          if [ "$FAILED" != "0" ]; then
            FAILED_SECTION="**${FAILED} test results failed**"
            if [ -n "$FAILED_SPECS" ]; then
              while IFS= read -r spec_name; do
                [ -z "$spec_name" ] && continue
                FAILED_SECTION="${FAILED_SECTION}
          • [${spec_name}](${TEST_RESULTS_URL})"
              done <<< "$FAILED_SPECS"
            fi
          fi

          TITLE="Automation Report Cypress"
          DESC="Test Run [#${{ github.run_number }}](${DISPLAY_URL}) of the **${REPO_NAME}** ${STATUS_TEXT}."

          BODY="${DESC}

          **Test Suite**
          ${SUITE_DISPLAY}

          **Execution**
          🗓  ${DATE_RUN}
          ⏱  ${TEST_DURATION}

          **Results**
          Total Runs    : ${TOTAL}
          ✅  Passed    : ${PASSED}
          ❌  Failed    : ${FAILED}"

          if [ -n "$FAILED_SECTION" ]; then
            BODY="${BODY}

          ─────────────────
          ${FAILED_SECTION}"
          fi

          ACTOR="${{ github.actor }}"
          FOOTER="${REPO_NAME} | ${BRANCH_INFO} | ${TRIGGER_LABEL} by ${ACTOR}"

          jq -n \
            --arg title  "$TITLE" \
            --arg body   "$BODY" \
            --arg footer "$FOOTER" \
            --arg url    "$DISPLAY_URL" \
            --argjson color $COLOR \
          '{
            embeds: [{
              title: $title,
              url: $url,
              description: $body,
              color: $color,
              footer: { text: $footer },
              timestamp: (now | todateiso8601)
            }]
          }' | curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            ${{ secrets.DISCORD_WEBHOOK }}