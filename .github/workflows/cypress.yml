name: Seva Cypress Automation Test

on:
  push:
    branches: [ Seva_2.0_Web_Cypress ]
  pull_request:
    branches: [ Seva_2.0_Web_Cypress ]
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 0-5'  # Senin-Sabtu 06:00 WIB
    - cron: '0 5 * * 1-6'   # Senin-Sabtu 12:00 WIB

concurrency:
  group: cypress-${{ github.ref_name }}
  cancel-in-progress: false  # tunggu run sebelumnya selesai, tidak di-cancel

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Seva 2.0 - Web Cypress"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: Seva_2.0_Web_Cypress

      - name: Detect trigger & start time
        run: |
          echo "TRIGGER=${{ github.event_name }}" >> $GITHUB_ENV
          echo "JOB_START_TIME=$(date +%s)"       >> $GITHUB_ENV
        working-directory: "."

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc
        working-directory: "."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install project dependencies
        run: npm ci

      # ============================================================
      # RUN CYPRESS
      # ============================================================
      - name: Run Cypress Tests
        continue-on-error: true
        working-directory: "Seva 2.0 - Web Cypress"
        run: |
          npx cypress run \
            --record \
            --key ${{ secrets.CYPRESS_RECORD_KEY }} \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        working-directory: "Seva 2.0 - Web Cypress"
        run: |
          touch cypress-raw.txt
          sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # ============================================================
      # ALLURE
      # ============================================================
      - name: Generate Allure Report
        if: always()
        working-directory: "Seva 2.0 - Web Cypress"
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          fi

      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: "Seva 2.0 - Web Cypress/allure-report/"
          retention-days: 30

      # ============================================================
      # EXTRACT STATS
      # ============================================================
      - name: Extract test summary
        if: always()
        working-directory: "Seva 2.0 - Web Cypress"
        run: |
          JOB_END_TIME=$(date +%s)
          DURATION_SEC=$(( JOB_END_TIME - JOB_START_TIME ))
          MINUTES=$((DURATION_SEC / 60))
          SECONDS=$((DURATION_SEC % 60))

          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          echo "=== SUMMARY LINE: $SUMMARY_LINE ==="

          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            echo "=== CLEAN: $CLEAN ==="
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi

          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          # TS folder dari tabel output Cypress
          TS_NAME=$(grep -E "│\s+[✔✖]" cypress-output.txt \
            | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" \
            | sed 's|/[^/]*$||' \
            | sort -u \
            | sed 's/^/• /')
          echo "=== TS_NAME from output: $TS_NAME ==="

          # Fallback: semua folder di dalam cypress/e2e
          if [ -z "$TS_NAME" ]; then
            TS_NAME=$(find cypress/e2e -mindepth 1 -maxdepth 1 -type d \
              | sed 's|.*/||' | sort | sed 's/^/• /')
            echo "=== TS_NAME from folder: $TS_NAME ==="
          fi
          TS_NAME=${TS_NAME:-"• e2e"}

          echo "TOTAL_TESTS=$TOTAL"                    >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSING"                 >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILING"                 >> $GITHUB_ENV
          echo "PENDING_TESTS=$PENDING"                >> $GITHUB_ENV
          echo "TEST_DURATION=${MINUTES}m ${SECONDS}s" >> $GITHUB_ENV
          echo "PASS_RATE=${PASS_RATE}%"               >> $GITHUB_ENV
          echo "TS_NAME<<EOF"                          >> $GITHUB_ENV
          echo "$TS_NAME"                              >> $GITHUB_ENV
          echo "EOF"                                   >> $GITHUB_ENV

          echo "Total=$TOTAL | Passed=$PASSING | Failed=$FAILING | TS=$TS_NAME"

      - name: Extract failed test details
        if: always()
        working-directory: "Seva 2.0 - Web Cypress"
        run: |
          CYPRESS_RUN_URL=$(grep -oE 'https://cloud\.cypress\.io/projects/[^[:space:]]+/runs/[0-9]+' cypress-output.txt | head -1)
          echo "=== CYPRESS RUN URL: $CYPRESS_RUN_URL ==="

          TEST_RESULTS_URL="${CYPRESS_RUN_URL}/test-results?actions=%5B%5D&browsers=%5B%5D&groups=%5B%5D&isFlaky=%5B%5D&modificationDateRange=%7B%22startDate%22%3A%221970-01-01%22%2C%22endDate%22%3A%222038-01-19%22%7D&orderBy=EXECUTION_ORDER&oses=%5B%5D&specs=%5B%5D&statuses=%5B%5D&testingTypesEnum=%5B%5D"

          if [ -z "$CYPRESS_RUN_URL" ]; then
            TEST_RESULTS_URL="https://cloud.cypress.io/projects/3x3m8i/runs"
          fi

          echo "CYPRESS_RUN_URL=$CYPRESS_RUN_URL"   >> $GITHUB_ENV
          echo "TEST_RESULTS_URL=$TEST_RESULTS_URL" >> $GITHUB_ENV

          F="cypress-output.txt"

          FAILED_SPECS=$(grep -E "│\s+✖" "$F" \
            | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" \
            | sed "s/\.cy\.js$//" \
            | sort -u)

          if [ -z "$FAILED_SPECS" ]; then
            FAILED_SPECS=$(grep -E "✖" "$F" \
              | grep "\.cy\.js" \
              | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" \
              | sed "s/\.cy\.js$//" \
              | sort -u)
          fi

          echo "=== FAILED SPECS: $FAILED_SPECS ==="

          FAILED_TESTS_PARSED=$(awk '
            /^[[:space:]]+[0-9]+\)/ { in_block=1; describe_line=""; test_line=""; next }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); describe_line=line; next
            }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line!="" && test_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); gsub(/:$/, "", line)
              test_line=line; print describe_line "|" test_line; in_block=0
            }
            /^[[:space:]]*$/ && in_block==1 { in_block=0 }
          ' "$F")

          echo "FAILED_SPECS<<EOF"         >> $GITHUB_ENV
          echo "$FAILED_SPECS"             >> $GITHUB_ENV
          echo "EOF"                       >> $GITHUB_ENV

          echo "FAILED_TESTS_PARSED<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS_PARSED"     >> $GITHUB_ENV
          echo "EOF"                      >> $GITHUB_ENV

      # ============================================================
      # DISCORD NOTIFICATION
      # ============================================================
      - name: Send Discord Notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_NUMBER:  ${{ github.run_number }}
          REPOSITORY:  ${{ github.repository }}
          REF_NAME:    ${{ github.ref_name }}
          EVENT_NAME:  ${{ github.event_name }}
          ACTOR:       ${{ github.actor }}
          PR_NUMBER:   ${{ github.event.pull_request.number }}
          HEAD_REF:    ${{ github.head_ref }}
        run: |
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")

          TOTAL=${TOTAL_TESTS:-0}
          PASSED=${PASSED_TESTS:-0}
          FAILED=${FAILED_TESTS:-0}
          PENDING=${PENDING_TESTS:-0}

          if [ "$FAILED" != "0" ]; then
            STATUS_TEXT="has failed"
            COLOR=15158332
          else
            STATUS_TEXT="has passed"
            COLOR=3066993
          fi

          case "$EVENT_NAME" in
            schedule)          TRIGGER_LABEL="Scheduled" ;;
            push)              TRIGGER_LABEL="Push by ${ACTOR}" ;;
            pull_request)      TRIGGER_LABEL="Pull Request by ${ACTOR}" ;;
            workflow_dispatch) TRIGGER_LABEL="Manual by ${ACTOR}" ;;
            *)                 TRIGGER_LABEL="$EVENT_NAME" ;;
          esac

          if [ "$EVENT_NAME" = "pull_request" ]; then
            BRANCH_INFO="PR #${PR_NUMBER} (${HEAD_REF})"
          else
            BRANCH_INFO="${REF_NAME}"
          fi

          CLOUD_URL="https://cloud.cypress.io/projects/3x3m8i/runs"
          if [ -n "$CYPRESS_RUN_URL" ]; then
            DISPLAY_URL="$CYPRESS_RUN_URL"
          else
            DISPLAY_URL="$CLOUD_URL"
          fi

          REPO_NAME="seva-web-automation"

          # Suite: kalau ada failed → folder dari spec yang failed
          #        kalau semua passed → semua folder yang dijalankan
          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            SUITE_DISPLAY=$(echo "$FAILED_SPECS" \
              | sed 's|/[^/]*$||' \
              | sort -u \
              | sed 's/^/• /')
          else
            SUITE_DISPLAY="$TS_NAME"
          fi

          # Failed list: "FolderName - TC01-NamaFile" dengan link
          # FAILED_SPECS format: "LeadsForm/TC01-Homepage"
          FAILED_SECTION=""
          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            FAILED_SECTION="**${FAILED} test results failed**"
            while IFS= read -r spec_path; do
              [ -z "$spec_path" ] && continue
              # Ubah "LeadsForm/TC01-Homepage" → "LeadsForm - TC01-Homepage"
              DISPLAY_NAME=$(echo "$spec_path" | sed 's|/| - |')
              FAILED_SECTION="${FAILED_SECTION}
          • [${DISPLAY_NAME}](${TEST_RESULTS_URL})"
                      done <<< "$FAILED_SPECS"
                    fi

                    TITLE="Automation Report Cypress"
                    DESC="Test Run [#${RUN_NUMBER}](${DISPLAY_URL}) of the **${REPO_NAME}** ${STATUS_TEXT}."

                    BODY="${DESC}

          **Test Suite**
          ${SUITE_DISPLAY}

          **Execution**
          🗓  ${DATE_RUN}
          ⏱  ${TEST_DURATION}

          **Results**
          Total Runs    : ${TOTAL}
          ✅  Passed    : ${PASSED}
          ❌  Failed    : ${FAILED}"

                    if [ -n "$FAILED_SECTION" ]; then
                      BODY="${BODY}

          ─────────────────
          ${FAILED_SECTION}"
                    fi

                    FOOTER="${REPO_NAME} | ${BRANCH_INFO} | ${TRIGGER_LABEL}"

                    jq -n \
                      --arg title  "$TITLE" \
                      --arg body   "$BODY" \
                      --arg footer "$FOOTER" \
                      --arg url    "$DISPLAY_URL" \
                      --argjson color $COLOR \
                    '{
                      embeds: [{
                        title: $title,
                        url: $url,
                        description: $body,
                        color: $color,
                        footer: { text: $footer },
                        timestamp: (now | todateiso8601)
                      }]
                    }' | curl -s \
                      -H "Content-Type: application/json" \
                      -X POST \
                      -d @- \
                      "$DISCORD_WEBHOOK"