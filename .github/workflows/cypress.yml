name: Seva Cypress Automation Test

on:
  push:
    branches: [ "Seva_2.0_Web_Cypress" ]
  pull_request:
    branches: [ "Seva_2.0_Web_Cypress" ]
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 0-5'  # Senin-Sabtu 06:00 WIB
    - cron: '0 5 * * 1-6'   # Senin-Sabtu 12:00 WIB

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: "Seva_2.0_Web_Cypress"

      - name: Detect trigger & start time
        run: |
          echo "TRIGGER=${{ github.event_name }}" >> $GITHUB_ENV
          echo "JOB_START_TIME=$(date +%s)"       >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install project dependencies
        run: npm install

      # ============================================================
      # LOAD TREND dari cache run sebelumnya
      # ============================================================
      - name: Restore previous run stats
        uses: actions/cache@v4
        with:
          path: .previous-run.json
          key: cypress-prev-run-${{ github.ref_name }}
          restore-keys: cypress-prev-run-

      # ============================================================
      # RUN CYPRESS
      # ============================================================
      - name: Run Cypress Tests
        continue-on-error: true
        run: |
          npx cypress run \
            --record \
            --key ${{ secrets.CYPRESS_RECORD_KEY }} \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        run: |
          touch cypress-raw.txt
          sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # ============================================================
      # ALLURE
      # ============================================================
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            allure generate allure-results --clean -o allure-report
          fi

      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      # ============================================================
      # EXTRACT STATS
      # ============================================================
      - name: Extract test summary
        if: always()
        run: |
          # Duration
          JOB_END_TIME=$(date +%s)
          DURATION_SEC=$(( JOB_END_TIME - JOB_START_TIME ))
          MINUTES=$((DURATION_SEC / 60))
          SECONDS=$((DURATION_SEC % 60))

          # Parse summary line dari tabel Cypress
          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi

          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          # TS folder dari spec yang actual dijalankan
          TS_NAME=$(grep -E "│\s+[✔✖]" cypress-output.txt \
            | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" \
            | sed 's|/[^/]*$||' \
            | sort -u \
            | sed 's/^/• /')
          if [ -z "$TS_NAME" ]; then
            TS_NAME=$(find cypress/e2e -mindepth 1 -maxdepth 1 -type d -name "TS-*" \
              | sed 's|.*/||' | sort | sed 's/^/• /')
          fi
          TS_NAME=${TS_NAME:-"• e2e"}

          # Environment info
          BROWSER=$(grep -oE 'Browser:[[:space:]]+[^\n]+' cypress-output.txt | head -1 | sed 's/Browser:[[:space:]]*//')
          NODE_VER=$(node --version 2>/dev/null || echo "N/A")
          OS_INFO="Linux Ubuntu (GitHub Actions)"
          BROWSER=${BROWSER:-"Electron"}

          # Trend
          TREND=""
          if [ -f .previous-run.json ]; then
            PREV_FAILED=$(jq -r '.failed // "-"' .previous-run.json)
            if [ "$PREV_FAILED" != "-" ]; then
              if [ "$FAILING" -lt "$PREV_FAILED" ]; then
                TREND="↑ Improved (prev: ${PREV_FAILED} failed)"
              elif [ "$FAILING" -gt "$PREV_FAILED" ]; then
                TREND="↓ Worse (prev: ${PREV_FAILED} failed)"
              else
                TREND="→ Same as previous run"
              fi
            fi
          fi

          # Simpan stats untuk trend run berikutnya
          echo "{\"total\":${TOTAL},\"passed\":${PASSING},\"failed\":${FAILING},\"pass_rate\":\"${PASS_RATE}\"}" \
            > .previous-run.json

          echo "TOTAL_TESTS=$TOTAL"                    >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSING"                 >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILING"                 >> $GITHUB_ENV
          echo "PENDING_TESTS=$PENDING"                >> $GITHUB_ENV
          echo "TEST_DURATION=${MINUTES}m ${SECONDS}s" >> $GITHUB_ENV
          echo "PASS_RATE=${PASS_RATE}%"               >> $GITHUB_ENV
          echo "BROWSER=$BROWSER"                      >> $GITHUB_ENV
          echo "OS_INFO=$OS_INFO"                      >> $GITHUB_ENV
          echo "TREND=$TREND"                          >> $GITHUB_ENV
          echo "TS_NAME<<EOF"                          >> $GITHUB_ENV
          echo "$TS_NAME"                              >> $GITHUB_ENV
          echo "EOF"                                   >> $GITHUB_ENV

          echo "Total=$TOTAL | Passed=$PASSING | Failed=$FAILING | Rate=${PASS_RATE}%"

      - name: Save run stats to cache
        if: always()
        uses: actions/cache@v4
        with:
          path: .previous-run.json
          key: cypress-prev-run-${{ github.ref_name }}

      - name: Extract failed test details
        if: always()
        run: |
          CYPRESS_RUN_URL=$(grep -oE 'https://cloud\.cypress\.io/projects/[^[:space:]]+/runs/[0-9]+' cypress-output.txt | head -1)
          TEST_RESULTS_URL="${CYPRESS_RUN_URL}/test-results?actions=%5B%5D&browsers=%5B%5D&groups=%5B%5D&isFlaky=%5B%5D&modificationDateRange=%7B%22startDate%22%3A%221970-01-01%22%2C%22endDate%22%3A%222038-01-19%22%7D&orderBy=EXECUTION_ORDER&oses=%5B%5D&specs=%5B%5D&statuses=%5B%5D&testingTypesEnum=%5B%5D"
          if [ -z "$CYPRESS_RUN_URL" ]; then
            TEST_RESULTS_URL="https://cloud.cypress.io/projects/wipkva/runs"
          fi

          echo "CYPRESS_RUN_URL=$CYPRESS_RUN_URL"   >> $GITHUB_ENV
          echo "TEST_RESULTS_URL=$TEST_RESULTS_URL" >> $GITHUB_ENV

          FAILED_SPECS=$(grep -E "│\s+✖" cypress-output.txt \
            | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" \
            | sed "s/\.cy\.js$//" \
            | sort -u)
          if [ -z "$FAILED_SPECS" ]; then
            FAILED_SPECS=$(grep -E "✖" cypress-output.txt \
              | grep "\.cy\.js" \
              | grep -oE "[A-Za-z0-9_/-]+\.cy\.js" \
              | sed "s/\.cy\.js$//" \
              | sort -u)
          fi

          echo "FAILED_SPECS<<EOF" >> $GITHUB_ENV
          echo "$FAILED_SPECS"     >> $GITHUB_ENV
          echo "EOF"               >> $GITHUB_ENV

      # ============================================================
      # ============================================================
      # DISCORD NOTIFICATION
      # ============================================================
      - name: Send Discord Notification
        if: always()
        run: |
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")

          TOTAL=${TOTAL_TESTS:-0}
          PASSED=${PASSED_TESTS:-0}
          FAILED=${FAILED_TESTS:-0}
          PENDING=${PENDING_TESTS:-0}

          if [ "$FAILED" != "0" ]; then
            STATUS_TEXT="has failed"
            RESULT_ICON="❌"
            COLOR=15158332
          else
            STATUS_TEXT="has passed"
            RESULT_ICON="✅"
            COLOR=3066993
          fi

          case "$TRIGGER" in
            schedule)          TRIGGER_LABEL="Scheduled"    ;;
            push)              TRIGGER_LABEL="Push to main" ;;
            pull_request)      TRIGGER_LABEL="Pull Request" ;;
            workflow_dispatch) TRIGGER_LABEL="Manual"       ;;
            *)                 TRIGGER_LABEL="$TRIGGER"     ;;
          esac

          if [ "$TRIGGER" = "pull_request" ]; then
            BRANCH_INFO="PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})"
          else
            BRANCH_INFO="${{ github.ref_name }}"
          fi

          CLOUD_URL="https://cloud.cypress.io/projects/wipkva/runs"
          if [ -n "$CYPRESS_RUN_URL" ]; then
            DISPLAY_URL="$CYPRESS_RUN_URL"
          else
            DISPLAY_URL="$CLOUD_URL"
          fi
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"

          # Suite: jika ada failed → TS dari spec failed saja
          #        jika semua passed → semua TS yang dijalankan
          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            SUITE_DISPLAY=$(echo "$FAILED_SPECS"               | sed 's|/[^/]*$||'               | sort -u               | sed 's/^/• /')
          else
            SUITE_DISPLAY="$TS_NAME"
          fi

          # Failed section
          FAILED_SECTION=""
          if [ "$FAILED" != "0" ]; then
            FAILED_SECTION="**${FAILED} test results failed**"
            if [ -n "$FAILED_SPECS" ]; then
              while IFS= read -r spec_name; do
                [ -z "$spec_name" ] && continue
                FAILED_SECTION="${FAILED_SECTION}
          • [${spec_name}](${TEST_RESULTS_URL})"
                        done <<< "$FAILED_SPECS"
                      fi
                    fi

          # Build body
          TITLE="Automation Report Cypress"
          DESC="Test Run [#${{ github.run_number }}](${DISPLAY_URL}) of the **${REPO_NAME}** ${STATUS_TEXT}."

          BODY="${DESC}

          **Test Suite**
          ${SUITE_DISPLAY}

          **Execution**
          🗓  ${DATE_RUN}
          ⏱  ${TEST_DURATION}

          **Results**
          Total Runs    : ${TOTAL}
          ✅  Passed    : ${PASSED}
          ❌  Failed    : ${FAILED}"

          if [ -n "$FAILED_SECTION" ]; then
            BODY="${BODY}

          ─────────────────
          ${FAILED_SECTION}"
                    fi

                    FOOTER="${REPO} | ${BRANCH_INFO} | ${TRIGGER_LABEL}"

                    jq -n             --arg title  "$TITLE"             --arg body   "$BODY"             --arg footer "$FOOTER"             --arg url    "$DISPLAY_URL"             --argjson color $COLOR           '{
                      embeds: [{
                                title: $title,
                                url: $url,
                                description: $body,
                                color: $color,
                                footer: { text: $footer },
                                timestamp: (now | todateiso8601)
                              }]
                              }'| curl -s -H "Content-Type: application/json"               -X POST               -d @-               ${{ secrets.DISCORD_WEBHOOK }}
