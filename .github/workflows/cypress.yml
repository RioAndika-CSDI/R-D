name: Seva Cypress Automation Test

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '45 12 * * *'   # 19:45 WIB
    - cron: '15 13 * * *'   # 20:15 WIB

concurrency:
  group: cypress-${{ github.ref_name }}-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ============================================================
  # JOB 1: RUN CYPRESS
  # ============================================================
  cypress-run:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: "Seva2.0-WebCypress"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect trigger & start time
        run: |
          echo "TRIGGER=${{ github.event_name }}" >> $GITHUB_ENV
          echo "JOB_START_TIME=$(date +%s)"       >> $GITHUB_ENV

      - name: Debug schedule info
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "schedule cron: ${{ github.event.schedule }}"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Detect schedule phase
        if: github.event_name == 'schedule'
        run: |
          CRON="${{ github.event.schedule }}"
          if [ "$CRON" = "45 12 * * *" ]; then
            PHASE="phase1"
          elif [ "$CRON" = "15 13 * * *" ]; then
            PHASE="phase2"
          fi
          echo "PHASE=$PHASE" >> $GITHUB_ENV
          echo "Detected PHASE=$PHASE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install project dependencies
        run: npm ci

      # ============================================================
      # RUN CYPRESS
      # ============================================================
      - name: Run Cypress Tests
        continue-on-error: true
        run: |
          if [ "$PHASE" = "phase1" ]; then
            SPEC_PATH="cypress/e2e/Phase1_RefinancingLeads/**/*.cy.js"
          elif [ "$PHASE" = "phase2" ]; then
            SPEC_PATH="cypress/e2e/Phase1_RefinancingLeads/**/*.cy.js"
          else
            SPEC_PATH="cypress/e2e/**/*.cy.js"
          fi

          echo "Running specs: $SPEC_PATH"

          npx cypress run \
            --browser chrome \
            --spec "$SPEC_PATH" \
            --env allure=true \
            2>&1 | tee cypress-raw.txt

      - name: Strip ANSI color codes
        if: always()
        run: |
          touch cypress-raw.txt
          sed 's/\x1B\[[0-9;]*[mKHF]//g' cypress-raw.txt > cypress-output.txt

      # ============================================================
      # ALLURE
      # ============================================================
      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --quiet
          if [ -d allure-results ] && [ "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "✅ allure-results ditemukan, generate report..."
            allure generate allure-results --clean -o allure-report
          else
            echo "⚠️ allure-results kosong, buat placeholder..."
            mkdir -p allure-report
            echo "<html><body><h2>No test results found.</h2></body></html>" > allure-report/index.html
          fi

      - name: Upload Allure Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: "Seva2.0-WebCypress/allure-report/"
          retention-days: 30

      - name: Upload Output Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-output
          path: "Seva2.0-WebCypress/cypress-output.txt"
          retention-days: 1

  # ============================================================
  # JOB 2: DEPLOY & DISCORD
  # ============================================================
  deploy-and-notify:
    needs: cypress-run
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: ./allure-report

      - name: Download Output Text
        uses: actions/download-artifact@v4
        with:
          name: cypress-output
          path: ./

      # ============================================================
      # DEPLOY KE GITHUB PAGES
      # ============================================================
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          force_orphan: true

      # ============================================================
      # EXTRACT STATS
      # ============================================================
      - name: Extract test summary
        if: always()
        run: |
          SUMMARY_LINE=$(grep -E '(All specs passed|of [0-9]+ failed)' cypress-output.txt | tail -1)
          echo "=== SUMMARY LINE: $SUMMARY_LINE ==="

          if [ -n "$SUMMARY_LINE" ]; then
            CLEAN=$(echo "$SUMMARY_LINE" | sed 's/[^0-9 \t-]//g' | tr -s ' \t' ' ' | sed 's/^ //')
            echo "=== CLEAN: $CLEAN ==="
            FIELD_COUNT=$(echo "$CLEAN" | awk '{print NF}')
            TOTAL=$(echo "$CLEAN"   | awk -v n=$FIELD_COUNT '{print $(n-4)}' | sed 's/-/0/')
            PASSING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-3)}' | sed 's/-/0/')
            FAILING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-2)}' | sed 's/-/0/')
            PENDING=$(echo "$CLEAN" | awk -v n=$FIELD_COUNT '{print $(n-1)}' | sed 's/-/0/')
          fi

          TOTAL=${TOTAL:-0}
          PASSING=${PASSING:-0}
          FAILING=${FAILING:-0}
          PENDING=${PENDING:-0}

          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$(echo "scale=1; $PASSING * 100 / $TOTAL" | bc)
          else
            PASS_RATE="0"
          fi

          CRON="${{ github.event.schedule }}"
          if [ "$CRON" = "45 12 * * *" ]; then
            TS_NAME="• Phase1_RefinancingLeads"
          elif [ "$CRON" = "15 13 * * *" ]; then
            TS_NAME="• Phase1_RefinancingLeads"
          else
            TS_NAME=$(grep -E "│\s+[✔✖]" cypress-output.txt \
              | grep -oE "[A-Za-z0-9_-]+/[A-Za-z0-9_/-]+\.cy\.js" \
              | sed 's|/[^/]*$||' | sort -u | sed 's/^/• /')
          fi
          TS_NAME=${TS_NAME:-"• e2e"}

          echo "TOTAL_TESTS=$TOTAL"      >> $GITHUB_ENV
          echo "PASSED_TESTS=$PASSING"   >> $GITHUB_ENV
          echo "FAILED_TESTS=$FAILING"   >> $GITHUB_ENV
          echo "PENDING_TESTS=$PENDING"  >> $GITHUB_ENV
          echo "PASS_RATE=${PASS_RATE}%" >> $GITHUB_ENV
          echo "TS_NAME<<EOF"            >> $GITHUB_ENV
          echo "$TS_NAME"                >> $GITHUB_ENV
          echo "EOF"                     >> $GITHUB_ENV

      - name: Extract failed test details
        if: always()
        run: |
          FAILED_TESTS_PARSED=$(awk '
            /^[[:space:]]+[0-9]+\)/ { in_block=1; describe_line=""; test_line=""; next }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); describe_line=line; next
            }
            in_block==1 && /^[[:space:]]+[A-Za-z]/ && describe_line!="" && test_line=="" {
              line=$0; gsub(/^[[:space:]]+/, "", line); gsub(/:$/, "", line)
              test_line=line; print describe_line "|" test_line; in_block=0
            }
            /^[[:space:]]*$/ && in_block==1 { in_block=0 }
          ' cypress-output.txt)

          FAILED_SPECS_RAW=$(awk '
            /│[[:space:]]+✖/ {
              line=$0
              gsub(/.*✖[[:space:]]+/, "", line)
              gsub(/[[:space:]]+[0-9].*$/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              buf=line
              if (buf ~ /\.cy\.js$/) {
                gsub(/\.cy\.js$/, "", buf)
                print buf
                buf=""
              }
              capturing=1
              next
            }
            capturing==1 && /│[[:space:]]+[✔✖]/ { capturing=0; buf="" }
            capturing==1 && /│/ {
              line=$0
              gsub(/^[^│]*│[[:space:]]+/, "", line)
              gsub(/[[:space:]]+$/, "", line)
              buf=buf line
              if (buf ~ /\.cy\.js/) {
                gsub(/\.cy\.js.*$/, "", buf)
                print buf
                buf=""
                capturing=0
              }
              next
            }
            capturing==1 && !/│/ { capturing=0; buf="" }
          ' cypress-output.txt | sort -u)

          FAILED_SPECS=$(printf '%s\n' "$FAILED_SPECS_RAW" | sed '/^$/d' | sort -u)

          echo "FAILED_SPECS<<EOF"        >> $GITHUB_ENV
          echo "$FAILED_SPECS"            >> $GITHUB_ENV
          echo "EOF"                      >> $GITHUB_ENV

          echo "FAILED_TESTS_PARSED<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS_PARSED"     >> $GITHUB_ENV
          echo "EOF"                      >> $GITHUB_ENV

      # ============================================================
      # DISCORD NOTIFICATION
      # ============================================================
      - name: Send Discord Notification
        if: always()
        run: |
          DATE_RUN=$(TZ='Asia/Jakarta' date "+%Y-%m-%d %H:%M:%S WIB")

          TOTAL=${TOTAL_TESTS:-0}
          PASSED=${PASSED_TESTS:-0}
          FAILED=${FAILED_TESTS:-0}
          PENDING=${PENDING_TESTS:-0}

          if [ "$FAILED" != "0" ]; then
            STATUS_TEXT="has failed"
            COLOR=15158332
          else
            STATUS_TEXT="has passed"
            COLOR=3066993
          fi

          case "${{ github.event_name }}" in
            schedule)          TRIGGER_LABEL="Scheduled"    ;;
            push)              TRIGGER_LABEL="Push"         ;;
            pull_request)      TRIGGER_LABEL="Pull Request" ;;
            workflow_dispatch) TRIGGER_LABEL="Manual"       ;;
            *)                 TRIGGER_LABEL="${{ github.event_name }}" ;;
          esac

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_INFO="PR #${{ github.event.pull_request.number }} (${{ github.head_ref }})"
          else
            BRANCH_INFO="${{ github.ref_name }}"
          fi

          REPO="${{ github.repository }}"
          REPO_NAME="${REPO##*/}"

          ALLURE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          ACTIONS_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$FAILED" != "0" ] && [ -n "$FAILED_SPECS" ]; then
            SUITE_DISPLAY=$(echo "$FAILED_SPECS" \
              | sed 's|/[^/]*$||' | sort -u | sed 's/^/• /')
          else
            SUITE_DISPLAY="$TS_NAME"
          fi

          FAILED_SECTION=""
          if [ "$FAILED" != "0" ]; then
            FAILED_SECTION="**${FAILED} test results failed**"
            if [ -n "$FAILED_SPECS" ]; then
              while IFS= read -r spec_name; do
                [ -z "$spec_name" ] && continue
                FAILED_SECTION="${FAILED_SECTION}
          • ${spec_name}"
              done <<< "$FAILED_SPECS"
            fi
          fi

          TITLE="Automation Report Allure"
          DESC="Test Run [#${{ github.run_number }}](${ALLURE_URL}) of the **${REPO_NAME}** ${STATUS_TEXT}."

          BODY="${DESC}

          **Test Suite**
          ${SUITE_DISPLAY}

          **Execution**
          🗓  ${DATE_RUN}

          **Results**
          Total Runs    : ${TOTAL}
          ✅  Passed    : ${PASSED}
          ❌  Failed    : ${FAILED}
          ⏭  Pending   : ${PENDING}
          📊  Pass Rate : ${PASS_RATE}

          🔗 [View Allure Report](${ALLURE_URL})
          🔗 [View Actions Log](${ACTIONS_URL})"

          if [ -n "$FAILED_SECTION" ]; then
            BODY="${BODY}

          ─────────────────
          ${FAILED_SECTION}"
          fi

          ACTOR="${{ github.actor }}"
          FOOTER="${REPO_NAME} | ${BRANCH_INFO} | ${TRIGGER_LABEL} by ${ACTOR}"

          jq -n \
            --arg title  "$TITLE" \
            --arg body   "$BODY" \
            --arg footer "$FOOTER" \
            --arg url    "$ALLURE_URL" \
            --argjson color $COLOR \
          '{
            embeds: [{
              title: $title,
              url: $url,
              description: $body,
              color: $color,
              footer: { text: $footer },
              timestamp: (now | todateiso8601)
            }]
          }' | curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            -d @- \
            ${{ secrets.DISCORD_WEBHOOK }}