name: Katalon
on:
  push:
    branches: [ ops/self-hosted ]

jobs:
  katalon-test:
    runs-on: self-hosted
#    strategy:
#      matrix:
#        test-suites:
#          - ts-dev-seva
#          - home-page
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Run Katalon
      run: |
        /opt/katalon/katalon-runtime-engine/katalonc \
            -noSplash \
            -runMode=console \
            -projectPath="${{ github.workspace }}/SEVA-WEB.prj" \
            -retry=0 \
            -testSuiteCollectionPath="${{ github.workspace }}/Test Suites/car-recomendation" \
            -browserType="Chrome" \
            -executionProfile="default" \
            -apiKey=${{ secrets.KATALON_API_KEY }} \
            --config \
            -proxy.auth.option=NO_PROXY \
            -proxy.system.option=NO_PROXY \
            -proxy.system.applyToDesiredCapabilities=true \
            -licenseRelease=true \
            -orgID=1396515 \
            -testOpsProjectId=1371631      

#      katalonc.sh -projectPath=/work -browserType="Chrome" -retry=0 -statusDelay=15 -testSuitePath="Test Suites/${{ matrix.test-suites }}" -apiKey=${{ secrets.KATALON_API_KEY }}

    - name: Katalon Report Uploader
      # if: always()
      uses: katalon-studio/report-uploader@v0.0.8
      env:
        PASSWORD: ${{ secrets.KATALON_UPLOADER_KEY }}
        PROJECT_ID: 1371631
        TYPE: katalon
        REPORT_PATH: Reports

